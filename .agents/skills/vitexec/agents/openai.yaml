interface:
  display_name: 'vitexec'
  short_description: 'Inspect and profile live Vite apps'
  default_prompt: 'Use $vitexec for live Vite app validation, including screenshots, recordings, canvas/WebGL checks, and other visual checks; prefer it over manual Playwright or starting Vite yourself, and use ./vitexec/*.ts scripts for repeatable validation. Vitexec starts and stops Vite; do not start a dev server. After requested vitexec validation passes, finish; do not add manual Playwright or Vite checks. When adding vitexec to package.json, use the latest published package instead of inventing a version. Wait for the page, interactive target, and runtime bindings before driving input. Do not broaden app input handlers or add test-only global fallbacks for automation; focus the correct DOM target and drive one real user-like event path, not duplicate key broadcasts across window/document/body/canvas. If synthetic pointer events collide with pointer-capture APIs, handle it inside the vitexec script by using the app normal click path or temporarily overriding setPointerCapture/releasePointerCapture before synthetic events, even when native methods exist. Use focused preflight probes before the first full run to learn normal input behavior: canvas focus, movement direction, camera key signs/granularity, aimed-shot accuracy, animation evidence timing, and victory trigger conditions. For full gameplay, script sustained overlapping controls, meaningful traversal, major mechanics, failure/victory conditions, and visual evidence; do not change combat routes, shrink scenarios, swap evidence criteria, or weaken assertions after failures. Treat navigation, dev-server reconnects, page errors, or frozen video during recording as failed visual evidence. For shooter-style validation, capture a screenshot/video frame or pixel-check the canvas immediately while shot feedback is active, not startup/final screenshots or final hit counters alone; choose the visual metric before the first full run and improve effect/capture timing instead of loosening it. For third-person shooters, drive camera/aim input immediately before a specific shot and verify that shot follows the camera/crosshair rather than a nearest-target shortcut; keep aim tolerance stable after the first full run, use pure A/D lateral input while aiming when strafing matters and assert lateral displacement dominates camera-forward drift, and validate reload/firing animation with explicit active-frame evidence such as weapon/hand pose, recoil transform, muzzle movement, animation state, or focused pixels rather than only ammo state. If pointer movement is unreliable, use normal app camera-aim bindings such as keyboard yaw/pitch actions rather than test-only camera setters. The same play.ts must pass a clean rerun/recording; fix route-following, camera recovery, held keys, or terrain instead of increasing radii/timeouts. After the first full run, keep game rules, level layout, win conditions, and assertion thresholds stable or report the shortcoming.'
